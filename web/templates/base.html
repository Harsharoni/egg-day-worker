<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ SITE_TITLE }}{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body data-phase="{{ phase }}">
<header class="site-header">
  <a class="brand" href="/">🥚 {{ SITE_TITLE }}</a>
  <nav class="site-nav">
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Guilds</a>
    <a href="/leaderboard" {% if request.url.path == "/leaderboard" %}class="active"{% endif %}>Leaderboard</a>
  </nav>
  <div id="countdown" data-start-epoch="{{ START_EPOCH }}" data-end-epoch="{{ END_EPOCH }}"></div>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer class="site-footer">
  {% if last_updated %}<span>Last updated {{ last_updated.strftime("%d %b %Y, %H:%M") }} UTC</span>{% endif %}
</footer>
{% block scripts %}{% endblock %}
<script src="/static/app.js"></script>
</body>
</html>
