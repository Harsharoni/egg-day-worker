<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}{{ SITE_TITLE }}{% endblock %}</title>
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/style.css">
</head>
<body data-phase="{{ phase }}">
<header class="site-header">
  <a class="brand" href="/">🥚 {{ SITE_TITLE }}</a>
  <nav class="site-nav">
    <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Guilds</a>
    <a href="/leaderboard" {% if request.url.path == "/leaderboard" %}class="active"{% endif %}>Leaderboard</a>
  </nav>
  <div class="comp-status">
    <div id="countdown" data-start-epoch="{{ START_EPOCH }}" data-end-epoch="{{ END_EPOCH }}"></div>
    {% if last_updated %}<span id="last-updated" data-epoch="{{ last_updated.timestamp() | int }}" data-tooltip="When the worker last polled EGG9000 for stats, the freshness of the numbers below."></span>{% endif %}
    <span id="page-loaded" data-tooltip="When you last loaded this page. If 'Stats as of' is newer than this, hit refresh to see it."></span>
    <button type="button" id="refresh-btn" title="Refresh stats">&#8635;</button>
  </div>
</header>
<main>
{% block content %}{% endblock %}
</main>
{% block scripts %}{% endblock %}
<script src="/static/app.js"></script>
</body>
</html>
